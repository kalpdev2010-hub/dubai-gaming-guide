    <meta charset="UTF-8">

    <style>
        body {
            background-color: #121212;
            color: #ffffff;

            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(135deg, #1a1a1a, #000000);
            padding: 4rem 2rem;
            text-align: center;

        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        header p {
            color: #aaaaaa;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* Quick Nav Pills */
        .quick-nav { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 1.5rem; 
        }
        .nav-pill { 
            padding: 8px 20px; 
            background-color: rgba(0,0,0,0.5); 
            color: #ffffff; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 50px; 
            font-size: 0.85rem; 
            border: 1px solid #444; 
            transition: all 0.2s ease; 
        }
        .nav-pill:hover { 
            background-color: #00e5ff; 
            color: #121212; 
            border-color: #00e5ff; 
        }
        .nav-pill.active { 
            background-color: #00e5ff; 
            color: #121212; 
            border-color: #00e5ff; 
        }

        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .news-card {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #00e5ff;
            transition: transform 0.3s ease;
        }
        .news-card:hover {
            transform: translateY(-5px);
        }
        .status-badge {
            display: inline-block;
            background: #00e5ff;
            color: #000;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .news-date {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .news-title {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            color: #ffffff;
        }
        .news-headline {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .news-desc {
            color: #aaaaaa;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .filter-btn {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .filter-btn:hover {
            border-color: #00e5ff;
            color: #fff;
        }
        .filter-btn.active {
            background: #00e5ff;
            color: #000;
            border-color: #00e5ff;
        }
        .network-footer {
            background-color: #0a0a0a;
            padding: 3rem 1rem;
            text-align: center;
            border-top: 1px solid #333;
            margin-top: 4rem;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .network-footer h4 {
            color: #ffffff;
            margin-top: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
        }
        .network-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .network-links a {
            color: #cccccc;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 10px 20px;
            border: 1px solid #444;
            border-radius: 50px;
            transition: all 0.2s ease;
            background-color: #1a1a1a;
        }
        .network-links a:hover {
            color: #ffffff;
            border-color: #00e5ff;
            background-color: #2a2a2a;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        /* Mobile Tweak */
        @media (max-width: 600px) {
            .filter-btn {
                padding: 6px 14px;
                font-size: 12px;
            }
        }
    </style>

<body>
    <header>
        <h1>Gaming Gear Radar</h1>
        <p>The latest console drops, hardware specs, and setup upgrades for the UAE</p>
        
        <div class="quick-nav">
            <a href="index.html" class="nav-pill">Home Gateway</a>
            <a href="playstation.html" class="nav-pill">PlayStation World</a>
            <a href="xbox.html" class="nav-pill">Xbox World</a>
            <a href="nintendo.html" class="nav-pill">Nintendo World</a>
            <a href="setup.html" class="nav-pill">Command Center</a>
            <a href="anbernic.html" class="nav-pill">Retro (Anbernic)</a>
            <a href="news.html" class="nav-pill active">Gear Radar</a>
        </div>
    </header>

    <div class="container">
        <div class="brand-filter-wrapper" style="text-align: center; margin: 30px 0; padding: 0 15px;">
            <h3 style="color: #00e5ff; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;">Browse By Brand</h3>
            <div id="brand-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 1100px; margin: 0 auto;">
                <div id="brand-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 1100px; margin: 0 auto;">
                <button class="filter-btn active" onclick="filterNews('all', this)">All</button>
                <button class="filter-btn" onclick="filterNews('Alienware', this)">Alienware</button>
                <button class="filter-btn" onclick="filterNews('AMD', this)">AMD</button>
                <button class="filter-btn" onclick="filterNews('Anbernic', this)">Anbernic</button>
                <button class="filter-btn" onclick="filterNews('ASUS ROG', this)">ASUS ROG</button>
                <button class="filter-btn" onclick="filterNews('Corsair', this)">Corsair</button>
                <button class="filter-btn" onclick="filterNews('Elgato', this)">Elgato</button>
                <button class="filter-btn" onclick="filterNews('HyperX', this)">HyperX</button>
                <button class="filter-btn" onclick="filterNews('LG', this)">LG</button>
                <button class="filter-btn" onclick="filterNews('Logitech G', this)">Logitech G</button>
                <button class="filter-btn" onclick="filterNews('Nintendo', this)">Nintendo</button>
                <button class="filter-btn" onclick="filterNews('NVIDIA', this)">NVIDIA</button>
                <button class="filter-btn" onclick="filterNews('PlayStation', this)">PlayStation</button>
                <button class="filter-btn" onclick="filterNews('Razer', this)">Razer</button>
                <button class="filter-btn" onclick="filterNews('Samsung', this)">Samsung</button>
                <button class="filter-btn" onclick="filterNews('Secretlab', this)">Secretlab</button>
                <button class="filter-btn" onclick="filterNews('SteelSeries', this)">SteelSeries</button>
                <button class="filter-btn" onclick="filterNews('Valve', this)">Valve</button>
                <button class="filter-btn" onclick="filterNews('Xbox', this)">Xbox</button>
            </div>
        </div>

        <div class="news-grid" id="news-container" style="margin-top: 40px;"></div>
    </div>

    <div class="network-footer">
        <h4>Explore The Dubai Tech Network</h4>
        <div class="network-links">
            <a href="https://kalpdev2010-hub.github.io/dubai-cinema-guide/" target="_blank">Home Cinema Guide</a>
            <a href="https://kalpdev2010-hub.github.io/dubai-dj-guide/" target="_blank">Pro DJ Guide</a>
            <a href="https://kalpdev2010-hub.github.io/dubai-gaming-guide/" target="_blank">Gaming Setup Guide</a>
        </div>
    </div>

    <script>
        let allIssues = [];

        function fetchNews() {
            // Target points to Gaming Guide repository
            fetch('https://api.github.com/repos/kalpdev2010-hub/dubai-gaming-guide/issues?state=open')
                .then(response => response.json())
                .then(issues => {
                    allIssues = issues;
                    renderCards(issues);
                })
                .catch(err => console.error("Error loading news feed:", err));
        }

        function renderCards(issues) {
            const container = document.getElementById('news-container');
            container.innerHTML = ''; 

            if (issues.length === 0) {
                container.innerHTML = `
                    <div style="
                        color: white; 
                        text-align: center; 
                        grid-column: 1 / -1; 
                        width: 100%; 
                        padding: 100px 20px; 
                        font-family: 'Inter', sans-serif;
                        font-size: 18px;
                        letter-spacing: 1px;
                        opacity: 0.7;
                    ">
                        No hardware drops found yet. Check back soon!
                    </div>`;
                return;
            }

            issues.forEach(issue => {
                const brand = issue.labels.length > 0 ? issue.labels[0].name : 'Gaming Hardware';
                const date = new Date(issue.created_at).toLocaleDateString('en-AE', { day: 'numeric', month: 'short', year: 'numeric' });

                const card = document.createElement('div');
                card.className = 'news-card';
                
                card.innerHTML = `
                    <div class="status-badge">HARDWARE RADAR</div>
                    <div class="news-date">Spotted: ${date}</div>
                    <h2 class="news-title">${brand}</h2>
                    <div class="news-headline">${issue.title}</div>
                    <p class="news-desc" style="margin-top: 20px;">
                        <a href="${issue.body}" target="_blank" style="color:#00e5ff; text-decoration:none; font-weight:bold; border: 1px solid #00e5ff; padding: 8px 15px; border-radius: 4px; display: inline-block;">View Official Specs ➔</a>
                    </p>
                `;
                container.appendChild(card);
            });
        }

        function filterNews(selectedBrand, btnElement) {
            const allBtns = document.querySelectorAll('.filter-btn');
            allBtns.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            if (selectedBrand === 'all') {
                renderCards(allIssues);
            } else {
                const filtered = allIssues.filter(issue => {
                    const brandLabel = issue.labels.length > 0 ? issue.labels[0].name : '';
                    return brandLabel.toLowerCase() === selectedBrand.toLowerCase();
                });
                renderCards(filtered);
            }
            
            const scrollTarget = document.getElementById('brand-buttons');
            if (scrollTarget) {
                window.scrollTo({ top: scrollTarget.offsetTop - 20, behavior: 'smooth' });
            }
        }

        fetchNews();    
    </script>
</body>
</html>
